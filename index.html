<!DOCTYPE html>
<html>
<head>
    <title>Netflix Pro Clone</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            background: #141414;
            color: white;
            font-family: Arial;
        }

        header {
            background: black;
            padding: 15px 20px;
            color: red;
            font-size: 26px;
            font-weight: bold;
        }

        .banner {
            height: 320px;
            background: url("https://image.tmdb.org/t/p/w1280/rAiYTfKGqDCRIIqo664sY9XZIvQ.jpg") center/cover;
            display: flex;
            align-items: flex-end;
            padding: 20px;
            font-size: 30px;
            font-weight: bold;
        }

        .search-box {
            text-align: center;
            margin: 20px;
        }

        input {
            padding: 12px;
            width: 260px;
            border-radius: 5px;
            border: none;
        }

        .row {
            margin: 20px;
        }

        .row h2 {
            margin-left: 10px;
        }

        .movies {
            display: flex;
            overflow-x: auto;
            padding: 10px;
        }

        .card {
            margin-right: 12px;
            transition: transform 0.3s;
            position: relative;
        }

        .card img {
            width: 160px;
            border-radius: 10px;
        }

        .card:hover {
            transform: scale(1.15);
        }

        .info {
            position: absolute;
            bottom: 5px;
            left: 5px;
            font-size: 12px;
            background: rgba(0,0,0,0.7);
            padding: 5px;
            border-radius: 5px;
        }

        @media(max-width:600px) {
            .card img {
                width: 120px;
            }
        }
    </style>
</head>

<body>

<header>NETFLIX</header>

<div class="banner">🔥 Trending Now</div>

<div class="search-box">
    <input id="search" placeholder="Live Search (Sci-Fi, Action)" oninput="liveSearch()">
</div>

<div class="row">
    <h2>🎬 Movies</h2>
    <div class="movies" id="movies"></div>
</div>

<div class="row">
    <h2>🚀 Sci-Fi</h2>
    <div class="movies" id="scifi"></div>
</div>

<div class="row">
    <h2>🔥 Action</h2>
    <div class="movies" id="action"></div>
</div>

<script>
const posters = {
    "Inception": "https://image.tmdb.org/t/p/w500/qmDpIHrmpJINaRKAfWQfftjCdyi.jpg",
    "Titanic": "https://image.tmdb.org/t/p/w500/9xjZS2rlVxm8SFx8kPC3aIGCOYQ.jpg",
    "Avengers": "https://image.tmdb.org/t/p/w500/RYMX2wcKCBAr24UyPD7xwmjaTn.jpg",
    "Interstellar": "https://image.tmdb.org/t/p/w500/rAiYTfKGqDCRIIqo664sY9XZIvQ.jpg"
};

function randomRating() {
    return (Math.random() * 2 + 3).toFixed(1);
}

async function loadMovies(genre="Sci-Fi") {
    let res = await fetch(`http://127.0.0.1:8000/genre/${genre}`);
    let data = await res.json();

    let container = document.getElementById("movies");
    container.innerHTML = "";

    if(data.length === 0){
        container.innerHTML = "<p style='color:gray'>No movies found</p>";
        return;
    }

    data.forEach(movie => {
        let img = posters[movie.title] || "";

        container.innerHTML += `
            <div class="card">
                <img src="${img}">
                <div class="info">
                    ⭐ ${randomRating()}<br>
                    ${movie.title}
                </div>
            </div>
        `;
    });
}

async function loadCategory(genre, id){
    let res = await fetch(`http://127.0.0.1:8000/genre/${genre}`);
    let data = await res.json();

    let container = document.getElementById(id);
    container.innerHTML = "";

    data.forEach(movie => {
        let img = posters[movie.title] || "";

        container.innerHTML += `
            <div class="card">
                <img src="${img}">
            </div>
        `;
    });
}

function liveSearch() {
    let term = document.getElementById("search").value;

    if(term.length === 0){
        loadMovies("Sci-Fi");
    } else {
        loadMovies(term);
    }
}

// 🚀 AUTO LOAD
window.onload = () => {
    loadMovies("Sci-Fi");
    loadCategory("Sci-Fi", "scifi");
    loadCategory("Action", "action");
};
</script>

</body>
</html>
